<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tesora · Página de proyecto — Hugo Oliva</title>
  <link rel="stylesheet" href="assets/tokens.css"/>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); }
    /* Match active dot pulse from kit */
    @keyframes pulse-dot { 0%,100% { opacity: 1 } 50% { opacity: .5 } }
    .dot-pulse { animation: pulse-dot 2s ease-in-out infinite; }
    /* Themed scrollbar inside artboards */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    ::selection { background: var(--text-primary); color: var(--bg-primary); }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="pages/shared.jsx"></script>
  <script type="text/babel" src="pages/variation-a.jsx"></script>
  <script type="text/babel" src="pages/variation-b.jsx"></script>
  <script type="text/babel" src="pages/app.jsx"></script>
</body>
</html>
